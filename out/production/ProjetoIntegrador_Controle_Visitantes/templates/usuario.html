<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuários — Controle de Visitantes</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0F172A;
            min-height: 100vh;
            color: #F1F5F9;
        }

        nav {
            background: #1E293B;
            padding: 14px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
        }
        nav .brand { font-size: 16px; font-weight: 700; }
        .btn-voltar {
            color: #94A3B8;
            text-decoration: none;
            font-size: 13px;
            border: 1px solid #334155;
            padding: 6px 14px;
            border-radius: 6px;
        }
        .btn-voltar:hover { border-color: #94A3B8; color: #F1F5F9; }

        main { max-width: 900px; margin: 40px auto; padding: 0 20px; }

        h2 { font-size: 20px; font-weight: 700; margin-bottom: 20px; }

        /* ── Alertas ── */
        .alerta {
            padding: 10px 16px; border-radius: 6px;
            font-size: 13px; margin-bottom: 16px;
        }
        .alerta-erro    { background: #450a0a; color: #F87171; border: 1px solid #F87171; }
        .alerta-sucesso { background: #052e16; color: #4ADE80; border: 1px solid #4ADE80; }

        /* ── Formulário Cadastro ── */
        .card {
            background: #1E293B;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 24px;
            margin-bottom: 28px;
        }
        .card h3 { font-size: 15px; color: #94A3B8; margin-bottom: 16px; }

        .form-row { display: flex; gap: 12px; flex-wrap: wrap; }

        input[type="text"], input[type="password"] {
            flex: 1;
            min-width: 160px;
            padding: 9px 12px;
            background: #0F172A;
            border: 1px solid #334155;
            border-radius: 6px;
            color: #F1F5F9;
            font-size: 14px;
            outline: none;
        }
        input:focus { border-color: #3B82F6; }

        .btn-primary {
            padding: 9px 20px;
            background: #3B82F6;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }
        .btn-primary:hover { background: #2563EB; }

        /* ── Tabela ── */
        table { width: 100%; border-collapse: collapse; }
        th {
            background: #1E293B;
            color: #94A3B8;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 10px 14px;
            text-align: left;
            border-bottom: 1px solid #334155;
        }
        td {
            padding: 12px 14px;
            border-bottom: 1px solid #1E293B;
            font-size: 14px;
            vertical-align: middle;
        }
        tr:hover td { background: #1E293B; }

        .acoes { display: flex; gap: 8px; align-items: center; }

        input.senha-inline {
            padding: 6px 10px;
            width: 140px;
            min-width: unset;
            flex: unset;
        }

        .btn-danger {
            padding: 6px 12px;
            background: transparent;
            border: 1px solid #F87171;
            color: #F87171;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }
        .btn-danger:hover { background: #F87171; color: white; }

        .btn-sm {
            padding: 6px 12px;
            background: #334155;
            color: #F1F5F9;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }
        .btn-sm:hover { background: #475569; }
    </style>
</head>
<body>

<nav>
    <span class="brand">Controle de Visitantes</span>
    <a th:href="@{/menu}" class="btn-voltar">← Voltar ao Menu</a>
</nav>

<main>
    <h2>Gerenciar Usuários</h2>

    <!-- Alertas flash -->
    <div th:if="${sucesso}" class="alerta alerta-sucesso" th:text="${sucesso}"></div>
    <div th:if="${erro}"    class="alerta alerta-erro"    th:text="${erro}"></div>

    <!-- Cadastro -->
    <div class="card">
        <h3>Novo Usuário</h3>
        <form th:action="@{/usuarios/cadastrar}" method="post">
            <div class="form-row">
                <input type="text"     name="nome"  placeholder="Nome completo" required>
                <input type="text"     name="login" placeholder="Login"         required>
                <input type="password" name="senha" placeholder="Senha"         required>
                <button type="submit" class="btn-primary">Cadastrar</button>
            </div>
        </form>
    </div>

    <!-- Listagem -->
    <div class="card">
        <h3>Usuários Cadastrados</h3>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Login</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="u : ${usuarios}">
                    <td th:text="${u.id}"></td>
                    <td th:text="${u.nome}"></td>
                    <td th:text="${u.login}"></td>
                    <td>
                        <div class="acoes">
                            <!-- Alterar Senha -->
                            <form th:action="@{/usuarios/senha/{id}(id=${u.id})}" method="post" style="display:flex;gap:6px;">
                                <input type="password" name="novaSenha" placeholder="Nova senha" class="senha-inline" required>
                                <button type="submit" class="btn-sm">Alterar Senha</button>
                            </form>
                            <!-- Deletar -->
                            <form th:action="@{/usuarios/deletar/{id}(id=${u.id})}" method="post"
                                  onsubmit="return confirm('Confirma a exclusão?')">
                                <button type="submit" class="btn-danger">Excluir</button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(usuarios)}">
                    <td colspan="4" style="text-align:center; color:#475569; padding:24px;">
                        Nenhum usuário cadastrado.
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>

</body>
</html>

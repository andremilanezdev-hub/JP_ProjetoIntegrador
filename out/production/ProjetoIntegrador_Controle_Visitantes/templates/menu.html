<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu — Controle de Visitantes</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0F172A;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Navbar ── */
        nav {
            background: #1E293B;
            padding: 14px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
        }
        nav .brand { color: #F1F5F9; font-size: 16px; font-weight: 700; }
        nav .usuario { color: #94A3B8; font-size: 13px; }

        .btn-sair {
            background: transparent;
            border: 1px solid #F87171;
            color: #F87171;
            padding: 6px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            text-decoration: none;
        }
        .btn-sair:hover { background: #F87171; color: white; }

        /* ── Conteúdo ── */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            gap: 32px;
        }

        .saudacao h1 { color: #F1F5F9; font-size: 24px; font-weight: 700; }
        .saudacao p  { color: #94A3B8; font-size: 14px; margin-top: 6px; }
        .saudacao    { text-align: center; }

        /* ── Grid de módulos ── */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 220px);
            gap: 16px;
        }

        .card-modulo {
            background: #1E293B;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 28px 20px;
            text-align: center;
            text-decoration: none;
            color: #F1F5F9;
            font-size: 15px;
            font-weight: 600;
            transition: background 0.2s, border-color 0.2s;
            cursor: pointer;
        }
        .card-modulo:hover { background: #3B82F6; border-color: #3B82F6; }

        .card-modulo .icone { font-size: 32px; margin-bottom: 10px; }

        .card-indisponivel {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .card-indisponivel:hover { background: #1E293B; border-color: #334155; }
    </style>
</head>
<body>

<nav>
    <span class="brand">Controle de Visitantes</span>
    <div style="display:flex; align-items:center; gap:16px;">
        <span class="usuario">Olá, <strong th:text="${usuarioLogado}">usuário</strong></span>
        <a th:href="@{/logout}" class="btn-sair">Sair</a>
    </div>
</nav>

<main>
    <div class="saudacao">
        <h1>Menu Principal</h1>
        <p>Selecione um módulo para continuar</p>
    </div>

    <div class="grid">
        <a th:href="@{/usuarios}" class="card-modulo">
            <div class="icone">👤</div>
            Usuários
        </a>

        <a href="#" class="card-modulo card-indisponivel" title="Em desenvolvimento">
            <div class="icone">🧑‍🤝‍🧑</div>
            Visitantes
        </a>

        <a href="#" class="card-modulo card-indisponivel" title="Em desenvolvimento">
            <div class="icone">🏢</div>
            Departamentos
        </a>

        <a href="#" class="card-modulo card-indisponivel" title="Em desenvolvimento">
            <div class="icone">📋</div>
            Visitas
        </a>
    </div>
</main>

</body>
</html>

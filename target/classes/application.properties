# ── Servidor ─────────────────────────────────────────────────
server.port=8080

# ── Banco de Dados MySQL ──────────────────────────────────────
# Em Docker, SPRING_DATASOURCE_URL sobrescreve este valor automaticamente
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/controle_visitantes?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:ajava}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:SenhaForte123@}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── Thymeleaf ─────────────────────────────────────────────────
spring.thymeleaf.cache=${SPRING_THYMELEAF_CACHE:false}
spring.thymeleaf.encoding=UTF-8

# ── Logs ──────────────────────────────────────────────────────
logging.level.org.springframework.security=${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY:WARN}
